<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warzone Ultra Tactical - Definitive Edition</title>
    <style>
        :root {
            --ui-blue: #00d4ff;
            --ui-red: #ff2e63;
            --ui-gold: #ffcc00;
            --ui-bg: rgba(10, 10, 25, 0.7);
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #050508; font-family: var(--font-main);
            touch-action: none; -webkit-user-select: none; user-select: none;
        }

        canvas { display: block; image-rendering: auto; }

        /* --- UI / HUD --- */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 100; padding: 10px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .top-row { display: flex; justify-content: space-between; align-items: flex-start; }

        /* Zminimalizowany panel tury */
        .turn-card {
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            border-left: 4px solid var(--ui-blue);
            padding: 8px 15px;
            border-radius: 4px 12px 12px 4px;
            min-width: 150px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .turn-card h2 { margin: 0; font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 1px; }
        #active-player-name { margin: 2px 0; font-size: 16px; font-weight: 900; color: #fff; }
        #wind-status { font-size: 10px; color: var(--ui-blue); font-family: monospace; font-weight: bold; }

        /* Timer */
        #timer-box {
            background: var(--ui-bg);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        #timer-val { font-size: 28px; font-weight: 900; color: #fff; line-height: 1; }

        /* --- CONTROLS --- */
        .bottom-row {
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 20px 20px 20px;
        }

        #joy-container {
            width: 140px; height: 140px;
            background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 50%; position: relative; pointer-events: auto;
        }
        #joy-stick {
            width: 50px; height: 50px; background: rgba(255,255,255,0.9);
            border-radius: 50%; position: absolute; top: 45px; left: 45px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #jump-btn {
            width: 85px; height: 85px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            color: rgba(255,255,255,0.4); font-weight: bold; font-size: 12px;
            backdrop-filter: blur(3px);
        }

        /* --- MENUS --- */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #0f0f1a 0%, #000 100%);
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; z-index: 1000; color: white; cursor: pointer;
        }
        #start-overlay h1 { font-size: 4rem; margin: 0; letter-spacing: 10px; text-shadow: 0 0 20px var(--ui-blue); }
        #start-overlay p { margin-top: 20px; color: #555; font-weight: bold; animation: blink 1.5s infinite; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        @media (orientation: portrait) {
            #portrait-warning { display: flex; }
        }
        #portrait-warning {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#000;
            z-index: 9999; display:none; flex-direction:column; justify-content:center; align-items:center; color:#fff;
        }
    </style>
</head>
<body>

<div id="portrait-warning"><h1>OBRÓĆ EKRAN 📱</h1></div>

<div id="start-overlay" onclick="App.run()">
    <h1>WARZONE</h1>
    <p>DOTKNIJ BY ROZPOCZĄĆ</p>
</div>

<div id="hud">
    <div class="top-row">
        <div class="turn-card">
            <h2>AKTUALNA TURA</h2>
            <div id="active-player-name">---</div>
            <div id="wind-status">WIATR: 0.00</div>
        </div>
        <div id="timer-box">
            <div id="timer-val">60</div>
        </div>
    </div>
    <div class="bottom-row">
        <div id="joy-container"><div id="joy-stick"></div></div>
        <div id="jump-btn">SKOK</div>
    </div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * WARZONE ULTRA TACTICAL ENGINE
 * PEŁNA IMPLEMENTACJA BEZ UPROSZCZEŃ
 */

const SETTINGS = {
    zoom: 0.55,                // Optymalne dla mobile
    gravity: 0.25,
    windMax: 0.15,
    turnTime: 60,
    friction: 0.85,
    jumpImpulse: -8.8,
    explosionPower: 70,
    dpr: window.devicePixelRatio || 1
};

// --- UTILS ---
const M = {
    dist: (a, b) => Math.hypot(a.x - b.x, a.y - b.y),
    rand: (min, max) => Math.random() * (max - min) + min,
    clamp: (v, min, max) => Math.max(min, Math.min(max, v))
};

// --- AUDIO GENERATOR ---
const Sfx = {
    ctx: null,
    init() { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); },
    play(f, t, d, v, sweep = false) {
        if(!this.ctx) return;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = t;
        o.frequency.setValueAtTime(f, this.ctx.currentTime);
        if(sweep) o.frequency.exponentialRampToValueAtTime(10, this.ctx.currentTime + d);
        g.gain.setValueAtTime(v, this.ctx.currentTime);
        g.gain.linearRampToValueAtTime(0, this.ctx.currentTime + d);
        o.connect(g); g.connect(this.ctx.destination);
        o.start(); o.stop(this.ctx.currentTime + d);
    }
};

// --- CZĄSTECZKI ---
class Particle {
    constructor(x, y, color, type = 'pixel') {
        this.x = x; this.y = y;
        this.vx = M.rand(-6, 6);
        this.vy = M.rand(-6, 6);
        this.life = 1.0;
        this.decay = M.rand(0.01, 0.03);
        this.color = color;
        this.type = type;
        this.size = type === 'smoke' ? M.rand(10, 20) : M.rand(2, 5);
    }
    update() {
        this.x += this.vx; this.y += this.vy;
        if(this.type !== 'smoke') this.vy += 0.2;
        this.life -= this.decay;
    }
    draw(ctx) {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        if(this.type === 'smoke') {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
        ctx.globalAlpha = 1;
    }
}

// --- POCISK ---
class Ammo {
    constructor(x, y, vx, vy, owner) {
        this.x = x; this.y = y; this.vx = vx; this.vy = vy;
        this.owner = owner;
        this.active = true;
        this.t = 0;
    }
    update(world, wind) {
        this.vx += wind;
        this.vy += SETTINGS.gravity;
        this.x += this.vx; this.y += this.vy;
        this.t++;

        if(Math.random() > 0.5) App.particles.push(new Particle(this.x, this.y, 'rgba(255,255,255,0.4)', 'smoke'));

        if(world.isHit(this.x, this.y) || this.y > world.h + 200) this.explode(world);

        App.players.forEach(p => {
            if(!p.dead && p !== this.owner && M.dist(this, p) < 20) this.explode(world);
        });
    }
    explode(world) {
        if(!this.active) return;
        this.active = false;
        Sfx.play(50, 'sawtooth', 0.6, 0.3, true);
        world.carve(this.x, this.y, SETTINGS.explosionPower);
        
        App.players.forEach(p => {
            let d = M.dist(this, p);
            if(d < SETTINGS.explosionPower + 30) {
                let force = (SETTINGS.explosionPower + 30 - d) / SETTINGS.explosionPower;
                p.hp -= Math.floor(force * 55);
                let ang = Math.atan2(p.y - this.y, p.x - this.x);
                p.vx += Math.cos(ang) * force * 20;
                p.vy += Math.sin(ang) * force * 20 - 5;
                p.grounded = false;
                p.face = 'shock';
            }
        });

        for(let i=0; i<30; i++) App.particles.push(new Particle(this.x, this.y, i%2?'#ffaa00':'#ff4400'));
        App.shake = 15;
        setTimeout(() => App.nextTurn(), 1200);
    }
    draw(ctx) {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(this.x, this.y, 6, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
    }
}

// --- GRACZ ---
class Player {
    constructor(x, team, color, name) {
        this.x = x; this.y = 0;
        this.vx = 0; this.vy = 0;
        this.hp = 100;
        this.team = team;
        this.color = color;
        this.name = name;
        this.radius = 16;
        this.grounded = false;
        this.dead = false;
        this.face = 'neutral';
        this.dir = team === 1 ? 1 : -1;
        this.emotionTimer = 0;
    }
    update(world) {
        if(this.dead) return;
        this.vy += SETTINGS.gravity;
        this.x += this.vx; this.y += this.vy;
        this.vx *= SETTINGS.friction;

        if(world.isHit(this.x, this.y + this.radius)) {
            if(!this.grounded && this.vy > 8) {
                this.hp -= Math.floor(this.vy * 3);
                this.face = 'shock'; this.emotionTimer = 60;
                Sfx.play(120, 'square', 0.2, 0.1);
            }
            this.vy = 0; this.grounded = true;
            while(world.isHit(this.x, this.y + this.radius - 1)) this.y--;
        } else {
            this.grounded = false;
        }

        if(Math.abs(this.vx) > 0.2) this.dir = Math.sign(this.vx);
        if(this.emotionTimer > 0) this.emotionTimer--; else this.face = 'neutral';

        if(this.hp <= 0 || this.y > world.h + 200) {
            this.hp = 0; this.dead = true;
            if(App.activePlayer === this) App.nextTurn();
        }
    }
    draw(ctx) {
        if(this.dead) {
            ctx.fillStyle = '#555'; ctx.fillRect(this.x-10, this.y-5, 20, 25);
            return;
        }
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Body
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 3; ctx.stroke();

        // Facial Expression Logic
        ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.lineCap = 'round';
        let ox = this.dir * 4;
        // Eyes
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(ox - 4, -4, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(ox + 4, -4, 2, 0, Math.PI*2); ctx.fill();
        
        // Mouth
        ctx.beginPath();
        if(this.face === 'shock') ctx.arc(ox, 5, 3, 0, Math.PI*2);
        else if(this.face === 'happy') ctx.arc(ox, 2, 5, 0, Math.PI);
        else { ctx.moveTo(ox - 4, 6); ctx.lineTo(ox + 4, 6); }
        ctx.stroke();
        ctx.restore();

        // HP & Name
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(this.x-20, this.y-40, 40, 4);
        ctx.fillStyle = this.hp > 30 ? '#00ff00' : '#ff0000';
        ctx.fillRect(this.x-20, this.y-40, (this.hp/100)*40, 4);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
        ctx.fillText(this.name, this.x, this.y - 50);

        if(App.activePlayer === this && App.state === 'PLAYING') {
            ctx.fillStyle = '#ffcc00';
            let b = Math.sin(Date.now()*0.01)*5;
            ctx.beginPath(); ctx.moveTo(this.x, this.y - 70 + b); ctx.lineTo(this.x-5, this.y-80 + b); ctx.lineTo(this.x+5, this.y-80 + b); ctx.fill();
        }
    }
}

// --- TEREN ---
class World {
    constructor() {
        this.canvas = document.createElement('canvas');
        this.ctx = this.canvas.getContext('2d');
        this.w = 0; this.h = 0;
    }
    generate(w, h) {
        this.w = w; this.h = h;
        this.canvas.width = w; this.canvas.height = h;
        const g = this.ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0.5, '#388e3c'); g.addColorStop(0.8, '#5d4037'); g.addColorStop(1, '#2c1e1a');
        this.ctx.fillStyle = g;
        this.ctx.beginPath(); this.ctx.moveTo(0, h);
        let s = Math.random()*1000;
        for(let x=0; x<=w; x+=10) {
            let y = h*0.75 + Math.sin(x*0.004+s)*160 + Math.sin(x*0.02)*40;
            this.ctx.lineTo(x, y);
        }
        this.ctx.lineTo(w, h); this.ctx.fill();
    }
    isHit(x, y) {
        if(x<0 || x>=this.w || y<0 || y>=this.h) return false;
        return this.ctx.getImageData(x, y, 1, 1).data[3] > 100;
    }
    carve(x, y, r) {
        this.ctx.globalCompositeOperation = 'destination-out';
        this.ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI*2); this.ctx.fill();
        this.ctx.globalCompositeOperation = 'source-over';
    }
    findY(x) {
        for(let y=0; y<this.h; y+=5) if(this.isHit(x, y)) return y - 16;
        return this.h * 0.7;
    }
}

// --- ENGINE ---
const App = {
    players: [], projectiles: [], particles: [],
    world: new World(),
    activePlayer: null,
    state: 'IDLE',
    timer: 60, lastTick: 0,
    wind: 0, shake: 0,
    inputX: 0,
    aiming: false, aStart: {x:0, y:0}, aEnd: {x:0, y:0},

    run() {
        if(this.state !== 'IDLE') return;
        document.getElementById('start-overlay').style.display = 'none';
        this.canvas = document.getElementById('gameCanvas');
        this.ctx = this.canvas.getContext('2d');
        this.resize();
        Sfx.init();
        this.world.generate(window.innerWidth / SETTINGS.zoom, window.innerHeight / SETTINGS.zoom);
        
        // Spawn mixed
        let pData = [
            {t:1, c:'#00d4ff', n:'BŁĘKITNY 1'}, {t:2, c:'#ff2e63', n:'KARMAZYNOWY 1'},
            {t:1, c:'#00d4ff', n:'BŁĘKITNY 2'}, {t:2, c:'#ff2e63', n:'KARMAZYNOWY 2'},
            {t:1, c:'#00d4ff', n:'BŁĘKITNY 3'}, {t:2, c:'#ff2e63', n:'KARMAZYNOWY 3'}
        ].sort(() => Math.random() - 0.5);

        pData.forEach((d, i) => {
            let x = 200 + i * ((this.world.w - 400)/5);
            let p = new Player(x, d.t, d.c, d.n);
            p.y = this.world.findY(x);
            this.players.push(p);
        });

        this.activePlayer = this.players[0];
        this.setupControls();
        this.startTurn();
        requestAnimationFrame(t => this.loop(t));
    },

    resize() {
        this.canvas.width = window.innerWidth * SETTINGS.dpr;
        this.canvas.height = window.innerHeight * SETTINGS.dpr;
        this.ctx.scale(SETTINGS.dpr, SETTINGS.dpr);
    },

    startTurn() {
        const alive = this.players.filter(p => !p.dead);
        if(new Set(alive.map(p=>p.team)).size < 2) {
            alert("KONIEC BITWY!"); location.reload(); return;
        }
        this.timer = SETTINGS.turnTime;
        this.wind = (Math.random() - 0.5) * SETTINGS.windMax;
        this.state = 'PLAYING';
        this.updateHUD();
    },

    nextTurn() {
        if(this.state === 'NEXT') return;
        this.state = 'NEXT';
        setTimeout(() => {
            let idx = (this.players.indexOf(this.activePlayer) + 1) % this.players.length;
            this.activePlayer = this.players[idx];
            if(this.activePlayer.dead) return this.nextTurn();
            this.startTurn();
        }, 1000);
    },

    updateHUD() {
        document.getElementById('active-player-name').innerText = this.activePlayer.name;
        document.getElementById('active-player-name').style.color = this.activePlayer.color;
        document.getElementById('wind-status').innerText = `WIATR: ${(this.wind * 100).toFixed(2)}`;
    },

    setupControls() {
        const joy = document.getElementById('joy-container');
        const stick = document.getElementById('joy-stick');
        
        const moveJoy = (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const r = joy.getBoundingClientRect();
            const dx = t.clientX - (r.left + r.width/2);
            const val = M.clamp(dx, -40, 40);
            stick.style.transform = `translate(${val}px, 0px)`;
            this.inputX = val / 40;
        };

        joy.addEventListener('touchstart', moveJoy);
        joy.addEventListener('touchmove', moveJoy);
        joy.addEventListener('touchend', () => { stick.style.transform = 'translate(0,0)'; this.inputX = 0; });

        document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            if(this.activePlayer && this.activePlayer.grounded) {
                this.activePlayer.vy = SETTINGS.jumpImpulse;
                Sfx.play(200, 'sine', 0.1, 0.1);
            }
        });

        this.canvas.addEventListener('touchstart', (e) => {
            if(this.state !== 'PLAYING' || e.touches[0].clientX < 250) return;
            this.aiming = true;
            this.aStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
            this.aEnd = this.aStart;
        });

        this.canvas.addEventListener('touchmove', (e) => {
            if(this.aiming) this.aEnd = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        });

        this.canvas.addEventListener('touchend', () => {
            if(!this.aiming) return;
            this.aiming = false;
            let vx = (this.aStart.x - this.aEnd.x) * 0.2 / SETTINGS.zoom;
            let vy = (this.aStart.y - this.aEnd.y) * 0.2 / SETTINGS.zoom;
            this.projectiles.push(new Ammo(this.activePlayer.x, this.activePlayer.y-10, vx, vy, this.activePlayer));
            this.state = 'WATCHING';
            this.activePlayer.face = 'happy'; this.activePlayer.emotionTimer = 60;
        });
    },

    loop(time) {
        // Background
        this.ctx.fillStyle = '#050508'; this.ctx.fillRect(0,0,window.innerWidth, window.innerHeight);
        
        this.ctx.save();
        if(this.shake > 0) {
            this.ctx.translate(M.rand(-this.shake, this.shake), M.rand(-this.shake, this.shake));
            this.shake *= 0.9;
        }
        this.ctx.scale(SETTINGS.zoom, SETTINGS.zoom);

        this.ctx.drawImage(this.world.canvas, 0, 0);

        if(this.state === 'PLAYING') {
            if(time - this.lastTick > 1000) {
                this.timer--; this.lastTick = time;
                document.getElementById('timer-val').innerText = this.timer;
                if(this.timer <= 0) this.nextTurn();
            }
            this.activePlayer.vx = this.inputX * 5;
        }

        this.players.forEach(p => { p.update(this.world); p.draw(this.ctx); });
        this.projectiles.forEach((p,i) => {
            p.update(this.world, this.wind); p.draw(this.ctx);
            if(!p.active) this.projectiles.splice(i,1);
        });
        this.particles.forEach((p,i) => {
            p.update(); p.draw(this.ctx);
            if(p.life <= 0) this.particles.splice(i,1);
        });

        if(this.aiming) {
            this.ctx.beginPath(); this.ctx.setLineDash([5,5]); this.ctx.strokeStyle = '#fff';
            this.ctx.moveTo(this.activePlayer.x, this.activePlayer.y);
            this.ctx.lineTo(this.activePlayer.x + (this.aStart.x - this.aEnd.x)/SETTINGS.zoom, this.activePlayer.y + (this.aStart.y - this.aEnd.y)/SETTINGS.zoom);
            this.ctx.stroke(); this.ctx.setLineDash([]);
        }

        this.ctx.restore();
        requestAnimationFrame(t => this.loop(t));
    }
};
</script>
</body>
</html>
