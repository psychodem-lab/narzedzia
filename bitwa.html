<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worms-style HTML5 Game - Wersja 2.0</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: none;
        }
        canvas { display: block; }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            pointer-events: none;
        }
        #timer-display {
            position: absolute;
            top: 10px;
            right: 20px;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 24px;
            font-weight: bold;
        }
        #controls {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: white;
            text-shadow: 1px 1px 2px black;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <h2 id="turn-indicator">Ładowanie...</h2>
    <div id="team-health"></div>
</div>
<div id="timer-display">Czas: 90</div>
<div id="controls">
    Ruch: Strzałki (Lewo, Prawo), Skok: Strzałka w Górę.<br>
    Strzał: Przeciągnij myszką/palcem.
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const terrainCanvas = document.createElement('canvas');
    terrainCanvas.width = canvas.width;
    terrainCanvas.height = canvas.height;
    const tCtx = terrainCanvas.getContext('2d', { willReadFrequently: true });

    const gravity = 0.2;
    const explosionRadius = 50;
    
    let players = [];
    let projectiles = [];
    let currentTeam = 1; // 1 = Czerwoni, 2 = Niebiescy
    let lastPlayerIndex = { 1: -1, 2: -1 }; // Pamięta, który gracz z drużyny ruszał się ostatnio
    let currentActivePlayer = null;
    let isAiming = false;
    let dragStart = { x: 0, y: 0 };
    let dragCurrent = { x: 0, y: 0 };
    let turnState = 'PLAYING'; // PLAYING, SHOOTING, RESOLVING, GAMEOVER
    let timeLeft = 90;
    let lastTime = Date.now();
    let currentMap = {};

    // 5 rodzajów map
    const mapTypes = [
        { name: "Zielone Równiny", sky: "#87CEEB", grass: "#2E8B57", dirt: "#8B4513", func: (x) => Math.sin(x/100)*50 + Math.cos(x/250)*80 },
        { name: "Pustynia", sky: "#FFDAB9", grass: "#DAA520", dirt: "#D2691E", func: (x) => Math.sin(x/200)*40 },
        { name: "Mars", sky: "#FFA07A", grass: "#B22222", dirt: "#8B0000", func: (x) => Math.abs(Math.sin(x/80)*60) + Math.cos(x/50)*30 },
        { name: "Lodowiec", sky: "#E0FFFF", grass: "#F0FFFF", dirt: "#4682B4", func: (x) => (x < canvas.width/2) ? Math.sin(x/50)*20 : Math.cos(x/50)*20 },
        { name: "Kraina Kosmitów", sky: "#4B0082", grass: "#9932CC", dirt: "#483D8B", func: (x) => Math.sin(x/30)*40 + Math.sin(x/150)*100 }
    ];

    function generateTerrain() {
        currentMap = mapTypes[Math.floor(Math.random() * mapTypes.length)];
        document.body.style.backgroundColor = currentMap.sky;

        tCtx.fillStyle = currentMap.grass;
        tCtx.beginPath();
        tCtx.moveTo(0, canvas.height);
        for (let x = 0; x <= canvas.width; x += 5) {
            let y = canvas.height - 200 - currentMap.func(x);
            tCtx.lineTo(x, y);
        }
        tCtx.lineTo(canvas.width, canvas.height);
        tCtx.closePath();
        tCtx.fill();

        tCtx.globalCompositeOperation = 'source-atop';
        tCtx.fillStyle = currentMap.dirt;
        tCtx.fillRect(0, canvas.height - 150, canvas.width, 150);
        tCtx.globalCompositeOperation = 'source-over';
    }

    class Player {
        constructor(x, y, team, color, name) {
            this.x = x;
            this.y = y;
            this.vx = 0;
            this.vy = 0;
            this.radius = 10;
            this.team = team;
            this.color = color;
            this.name = name;
            this.hp = 100;
            this.isGrounded = false;
        }

        update() {
            if (this.hp <= 0) return;

            this.vy += gravity;
            this.y += this.vy;
            this.x += this.vx;

            this.vx *= 0.8;
            if (Math.abs(this.vx) < 0.1) this.vx = 0;

            let isColliding = checkTerrainCollision(this.x, this.y + this.radius);
            
            if (isColliding) {
                this.isGrounded = true;
                this.vy = 0;
                while (checkTerrainCollision(this.x, this.y + this.radius - 1)) {
                    this.y -= 1;
                }
            } else {
                this.isGrounded = false;
            }

            if (this.x < this.radius) this.x = this.radius;
            if (this.x > canvas.width - this.radius) this.x = canvas.width - this.radius;
            
            // Śmierć przez wypadnięcie za planszę
            if (this.y > canvas.height + 50) {
                this.hp = 0;
                if (currentActivePlayer === this && turnState === 'PLAYING') {
                    turnState = 'RESOLVING';
                    setTimeout(nextTurn, 1000); // Szybka zmiana tury po samobójstwie
                }
            }
        }

        draw() {
            if (this.hp <= 0) return;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.font = '10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(this.hp, this.x, this.y - 15);
            
            if (currentActivePlayer === this && turnState === 'PLAYING') {
                ctx.fillStyle = 'yellow';
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - 30);
                ctx.lineTo(this.x - 5, this.y - 40);
                ctx.lineTo(this.x + 5, this.y - 40);
                ctx.fill();
            }
        }
    }

    class Projectile {
        constructor(x, y, vx, vy) {
            this.x = x;
            this.y = y;
            this.vx = vx;
            this.vy = vy;
            this.radius = 4;
            this.active = true;
        }

        update() {
            this.vy += gravity;
            this.x += this.vx;
            this.y += this.vy;

            if (this.x < 0 || this.x > canvas.width || this.y > canvas.height) {
                this.explode();
                return;
            }

            if (checkTerrainCollision(this.x, this.y)) {
                this.explode();
            }
        }

        draw() {
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
        }

        explode() {
            this.active = false;
            createExplosion(this.x, this.y);
            turnState = 'RESOLVING';
            setTimeout(() => { nextTurn(); }, 2000);
        }
    }

    function init() {
        generateTerrain();
        
        // Funkcja znajdująca powierzchnię dla losowego punktu X
        const spawnPlayer = (team, color, name) => {
            let rx = Math.random() * (canvas.width - 100) + 50;
            players.push(new Player(rx, 10, team, color, name)); // Zrzucani z Y=10
        };

        for (let i = 0; i < 5; i++) spawnPlayer(1, 'red', `Czerwony ${i+1}`);
        for (let i = 0; i < 5; i++) spawnPlayer(2, 'blue', `Niebieski ${i+1}`);
        
        // Losowa drużyna zaczyna
        currentTeam = Math.random() > 0.5 ? 1 : 2;
        nextTurn();
        gameLoop();
    }

    function checkTerrainCollision(x, y) {
        if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) return false;
        const pixel = tCtx.getImageData(Math.floor(x), Math.floor(y), 1, 1).data;
        return pixel[3] > 0;
    }

    function createExplosion(x, y) {
        tCtx.globalCompositeOperation = 'destination-out';
        tCtx.beginPath();
        tCtx.arc(x, y, explosionRadius, 0, Math.PI * 2);
        tCtx.fill();
        tCtx.globalCompositeOperation = 'source-over';

        ctx.fillStyle = 'orange';
        ctx.beginPath();
        ctx.arc(x, y, explosionRadius, 0, Math.PI * 2);
        ctx.fill();

        players.forEach(p => {
            if (p.hp > 0) {
                let dx = p.x - x;
                let dy = p.y - y;
                let dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < explosionRadius + p.radius) {
                    let damage = Math.floor((1 - (dist / (explosionRadius + p.radius))) * 50);
                    p.hp -= damage;
                    p.vx += (dx / dist) * 7;
                    p.vy -= 7;
                    p.isGrounded = false;
                }
            }
        });
    }

    function nextTurn() {
        if (checkWinCondition()) return;

        // Przełączenie drużyny naprzemiennie
        currentTeam = currentTeam === 1 ? 2 : 1;

        // Jeśli nowa drużyna nie ma żywych graczy (rzadka sytuacja przy sprawdzaniu wygranej, ale profilaktycznie), zmień znów
        if (!players.some(p => p.team === currentTeam && p.hp > 0)) {
            currentTeam = currentTeam === 1 ? 2 : 1;
        }

        // Znajdź następnego żywego gracza w aktualnej drużynie
        let teamPlayers = players.filter(p => p.team === currentTeam);
        let attempts = 0;
        let foundPlayer = null;
        
        do {
            lastPlayerIndex[currentTeam] = (lastPlayerIndex[currentTeam] + 1) % teamPlayers.length;
            foundPlayer = teamPlayers[lastPlayerIndex[currentTeam]];
            attempts++;
            if(attempts > teamPlayers.length) break; // Zabezpieczenie
        } while (foundPlayer.hp <= 0);

        currentActivePlayer = foundPlayer;
        timeLeft = 90; // Reset timera
        lastTime = Date.now();
        turnState = 'PLAYING';
        updateUI();
    }

    function checkWinCondition() {
        let team1Alive = players.some(p => p.team === 1 && p.hp > 0);
        let team2Alive = players.some(p => p.team === 2 && p.hp > 0);

        const indicator = document.getElementById('turn-indicator');
        if (!team1Alive && !team2Alive) {
            indicator.innerText = "REMIS!";
            turnState = 'GAMEOVER';
            return true;
        } else if (!team1Alive) {
            indicator.innerText = "WYGRYWAJĄ NIEBIESCY!";
            turnState = 'GAMEOVER';
            return true;
        } else if (!team2Alive) {
            indicator.innerText = "WYGRYWAJĄ CZERWONI!";
            turnState = 'GAMEOVER';
            return true;
        }
        return false;
    }

    function updateUI() {
        if (turnState === 'GAMEOVER') return;
        document.getElementById('turn-indicator').innerText = `Mapa: ${currentMap.name} | Tura: ${currentActivePlayer.name}`;
        document.getElementById('turn-indicator').style.color = currentActivePlayer.color;

        let t1hp = players.filter(p=>p.team===1 && p.hp>0).reduce((acc, p) => acc + p.hp, 0);
        let t2hp = players.filter(p=>p.team===2 && p.hp>0).reduce((acc, p) => acc + p.hp, 0);
        document.getElementById('team-health').innerText = `Czerwoni HP: ${t1hp} | Niebiescy HP: ${t2hp}`;
    }

    // Obsługa wejścia (Klawiatura)
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.key] = true;
        if ((e.key === 'ArrowUp' || e.key === 'w') && turnState === 'PLAYING') {
            if (currentActivePlayer && currentActivePlayer.hp > 0 && currentActivePlayer.isGrounded) {
                currentActivePlayer.vy = -6;
                currentActivePlayer.isGrounded = false;
            }
        }
    });
    window.addEventListener('keyup', e => keys[e.key] = false);

    // Obsługa strzelania (Mysz / Dotyk)
    function getPointerPos(e) {
        if (e.touches) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
        return { x: e.clientX, y: e.clientY };
    }

    function handleStart(e) {
        if (turnState !== 'PLAYING') return;
        isAiming = true;
        let pos = getPointerPos(e);
        dragStart = pos;
        dragCurrent = pos;
    }

    function handleMove(e) {
        if (!isAiming) return;
        dragCurrent = getPointerPos(e);
    }

    function handleEnd(e) {
        if (!isAiming) return;
        isAiming = false;
        
        let dx = dragStart.x - dragCurrent.x;
        let dy = dragStart.y - dragCurrent.y;
        
        let powerMultiplier = 0.1;
        let vx = dx * powerMultiplier;
        let vy = dy * powerMultiplier;

        const maxVelocity = 20;
        let speed = Math.sqrt(vx*vx + vy*vy);
        if (speed > maxVelocity) {
            vx = (vx / speed) * maxVelocity;
            vy = (vy / speed) * maxVelocity;
        }

        if (speed > 1 && currentActivePlayer) {
            projectiles.push(new Projectile(currentActivePlayer.x, currentActivePlayer.y - currentActivePlayer.radius, vx, vy));
            turnState = 'SHOOTING';
        }
    }

    canvas.addEventListener('mousedown', handleStart);
    canvas.addEventListener('mousemove', handleMove);
    window.addEventListener('mouseup', handleEnd);
    canvas.addEventListener('touchstart', handleStart, {passive: false});
    canvas.addEventListener('touchmove', handleMove, {passive: false});
    window.addEventListener('touchend', handleEnd);

    // Główna pętla gry
    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(terrainCanvas, 0, 0);

        // Obsługa Timera
        if (turnState === 'PLAYING') {
            let now = Date.now();
            if (now - lastTime >= 1000) {
                timeLeft--;
                lastTime = now;
                document.getElementById('timer-display').innerText = `Czas: ${timeLeft}`;
                
                if (timeLeft <= 0) {
                    turnState = 'RESOLVING';
                    nextTurn();
                }
            }
        } else {
            // Zamróź timer podczas animacji strzału
            lastTime = Date.now(); 
        }

        // Ruch aktywnego gracza
        if (turnState === 'PLAYING' && currentActivePlayer && currentActivePlayer.hp > 0) {
            if ((keys['ArrowLeft'] || keys['a'])) currentActivePlayer.vx = -2;
            if ((keys['ArrowRight'] || keys['d'])) currentActivePlayer.vx = 2;
        }

        players.forEach(p => { p.update(); p.draw(); });

        for (let i = projectiles.length - 1; i >= 0; i--) {
            let proj = projectiles[i];
            proj.update();
            proj.draw();
            if (!proj.active) projectiles.splice(i, 1);
        }

        if (isAiming && turnState === 'PLAYING' && currentActivePlayer) {
            ctx.beginPath();
            ctx.moveTo(currentActivePlayer.x, currentActivePlayer.y);
            let dx = dragStart.x - dragCurrent.x;
            let dy = dragStart.y - dragCurrent.y;
            ctx.lineTo(currentActivePlayer.x + dx, currentActivePlayer.y + dy);
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.5)';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        requestAnimationFrame(gameLoop);
    }

    window.onload = init;
</script>
</body>
</html>
