<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worms Mobile Professional</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Courier New', Courier, monospace;
            touch-action: none; background-color: #000; color: white;
        }
        canvas { display: block; background: linear-gradient(to bottom, #1a2a6c, #b21f1f, #fdbb2d); }
        
        /* UI OVERLAYS */
        #ui-top {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; pointer-events: none;
            z-index: 10; text-shadow: 2px 2px 0px #000;
        }
        #timer { font-size: 32px; font-weight: bold; }
        
        /* ROTATION WARNING */
        #rotate-warning {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            text-align: center;
        }
        @media (orientation: portrait) {
            #rotate-warning { display: flex; }
        }

        /* MOBILE CONTROLS */
        #controls {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; align-items: flex-end;
            pointer-events: none;
        }
        .touch-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.2);
            border: 3px solid #fff; border-radius: 50%; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; user-select: none;
        }
        #joystick-container {
            width: 150px; height: 150px; background: rgba(255,255,255,0.1);
            border-radius: 50%; position: relative; pointer-events: auto;
        }
        #joystick-knob {
            width: 60px; height: 60px; background: #fff; border-radius: 50%;
            position: absolute; top: 45px; left: 45px;
        }

        #start-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="rotate-warning">
    <h1>PROSZĘ OBRÓCIĆ TELEFON</h1>
    <p>Gra działa tylko w trybie poziomym.</p>
</div>

<div id="start-screen" onclick="initGame()">
    <h1>WORMS HTML5</h1>
    <p>Kliknij, aby zacząć bitwę</p>
</div>

<div id="ui-top">
    <div id="info">Ładowanie...</div>
    <div id="timer">60</div>
</div>

<div id="controls">
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>
    <div id="jump-btn" class="touch-btn">SKOK</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const tCanvas = document.createElement('canvas');
    const tCtx = tCanvas.getContext('2d');

    let audioCtx, musicNode;
    let players = [], projectiles = [], particles = [], crates = [];
    let currentTeam = 1, activePlayer = null;
    let turnState = 'WAITING', timeLeft = 60, lastTick = 0;
    let gameRunning = false;
    let moveDir = 0;

    // --- AUDIO ENGINE ---
    function initAudio() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Muzyka w tle (Ambient Drone)
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(40, audioCtx.currentTime);
        let filter = audioCtx.createBiquadFilter();
        filter.frequency.value = 200;
        gain.gain.value = 0.02;
        osc.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
    }

    function playSound(freq, type, dur, vol) {
        if(!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + dur);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + dur);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + dur);
    }

    // --- CLASSES ---
    class Particle {
        constructor(x, y, color, size = 4) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1.0;
            this.color = color;
            this.size = Math.random() * size;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            this.vy += 0.1; this.life -= 0.02;
        }
        draw() {
            ctx.globalAlpha = this.life;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.size, this.size);
            ctx.globalAlpha = 1;
        }
    }

    class Crate {
        constructor(x) { this.x = x; this.y = -50; this.vy = 0; this.active = true; }
        update() {
            if(!this.active) return;
            this.vy += 0.2; this.y += this.vy;
            if(checkCol(this.x, this.y + 12)) { this.y -= this.vy; this.vy = 0; }
            players.forEach(p => {
                if(p.hp > 0 && Math.hypot(p.x - this.x, p.y - this.y) < 20) {
                    p.hp = Math.min(100, p.hp + 40);
                    this.active = false;
                    playSound(600, 'sine', 0.2, 0.1);
                }
            });
        }
        draw() {
            if(!this.active) return;
            ctx.fillStyle = '#8B4513'; ctx.fillRect(this.x-10, this.y-10, 20, 20);
            ctx.fillStyle = '#fff'; ctx.fillRect(this.x-2, this.y-8, 4, 16);
            ctx.fillRect(this.x-8, this.y-2, 16, 4);
        }
    }

    class Player {
        constructor(x, team, color) {
            this.x = x; this.y = 50; this.team = team; this.color = color;
            this.hp = 100; this.vx = 0; this.vy = 0; this.grounded = false;
        }
        update() {
            if(this.hp <= 0) {
                if(this.y < canvas.height + 100) { this.vy += 0.3; this.y += this.vy; }
                return;
            }
            
            let oldVy = this.vy;
            this.vy += 0.25; // Grawitacja
            this.x += this.vx; this.y += this.vy;
            this.vx *= 0.8;

            // Śmierć poza planszą
            if(this.y > canvas.height) {
                this.hp = 0;
                if(activePlayer === this) endTurn();
            }

            if(checkCol(this.x, this.y + 12)) {
                if(oldVy > 8) { // Fall Damage
                    this.hp -= Math.floor(oldVy * 3);
                    playSound(100, 'square', 0.1, 0.2);
                }
                this.vy = 0; this.grounded = true;
                while(checkCol(this.x, this.y + 11)) this.y--;
            } else { this.grounded = false; }

            // Low HP effect
            if(this.hp < 20 && Math.random() < 0.15) {
                particles.push(new Particle(this.x, this.y - 10, '#555', 6));
            }
        }
        draw() {
            if(this.hp <= 0) { // Nagrobek
                ctx.fillStyle = '#aaa';
                ctx.fillRect(this.x-12, this.y-5, 24, 20);
                ctx.fillStyle = '#000'; ctx.fillRect(this.x-2, this.y-2, 4, 12);
                ctx.fillRect(this.x-6, this.y+2, 12, 4);
                return;
            }
            ctx.fillStyle = this.color;
            ctx.beginPath(); ctx.arc(this.x, this.y, 12, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
            ctx.fillText(this.hp + " HP", this.x, this.y - 20);
            if(activePlayer === this && turnState === 'PLAYING') {
                ctx.fillStyle = 'yellow'; ctx.beginPath();
                ctx.moveTo(this.x, this.y-35); ctx.lineTo(this.x-5, this.y-45); ctx.lineTo(this.x+5, this.y-45); ctx.fill();
            }
        }
    }

    class Projectile {
        constructor(x, y, vx, vy) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.active = true; }
        update() {
            this.vx *= 0.99; this.vy += 0.2;
            this.x += this.vx; this.y += this.vy;
            
            // Kolizja bezpośrednia z graczem
            players.forEach(p => {
                if(p.hp > 0 && Math.hypot(p.x - this.x, p.y - this.y) < 15) this.explode();
            });

            if(checkCol(this.x, this.y) || this.y > canvas.height) this.explode();
        }
        explode() {
            if(!this.active) return;
            this.active = false;
            playSound(60, 'sawtooth', 0.5, 0.4);
            tCtx.globalCompositeOperation = 'destination-out';
            tCtx.beginPath(); tCtx.arc(this.x, this.y, 50, 0, Math.PI*2); tCtx.fill();
            tCtx.globalCompositeOperation = 'source-over';
            
            for(let i=0; i<25; i++) particles.push(new Particle(this.x, this.y, i % 2 ? 'orange' : 'red', 8));
            
            players.forEach(p => {
                let d = Math.hypot(p.x - this.x, p.y - this.y);
                if(d < 60) {
                    p.hp -= Math.floor(60 - d);
                    let ang = Math.atan2(p.y - this.y, p.x - this.x);
                    p.vx = Math.cos(ang) * 10; p.vy = -8;
                }
            });
            setTimeout(endTurn, 2000);
        }
        draw() { ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill(); }
    }

    // --- GAME ENGINE ---
    function checkCol(x, y) {
        if(x < 0 || x > canvas.width || y < 0 || y > canvas.height) return false;
        return tCtx.getImageData(x, y, 1, 1).data[3] > 0;
    }

    function generateTerrain() {
        tCanvas.width = canvas.width; tCanvas.height = canvas.height;
        tCtx.fillStyle = '#3e8e41';
        tCtx.beginPath(); tCtx.moveTo(0, canvas.height);
        for(let x=0; x<=canvas.width; x+=20) {
            let y = canvas.height - 100 - Math.sin(x/150)*100 - Math.cos(x/80)*50;
            tCtx.lineTo(x, y);
        }
        tCtx.lineTo(canvas.width, canvas.height); tCtx.fill();
    }

    function initGame() {
        if(gameRunning) return;
        document.getElementById('start-screen').style.display = 'none';
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        generateTerrain();
        initAudio();
        
        for(let i=0; i<3; i++) {
            players.push(new Player(100 + i*60, 1, '#ff4b2b'));
            players.push(new Player(canvas.width - 100 - i*60, 2, '#2b86ff'));
        }
        
        gameRunning = true;
        startTurn();
        requestAnimationFrame(loop);
    }

    function startTurn() {
        let alive = players.filter(p => p.team === currentTeam && p.hp > 0);
        if(alive.length === 0) {
            currentTeam = currentTeam === 1 ? 2 : 1;
            alive = players.filter(p => p.team === currentTeam && p.hp > 0);
        }
        if(players.filter(p => p.team === 1 && p.hp > 0).length === 0 || 
           players.filter(p => p.team === 2 && p.hp > 0).length === 0) {
            alert("KONIEC BITWY!"); location.reload(); return;
        }

        activePlayer = alive[Math.floor(Math.random() * alive.length)];
        timeLeft = 60; turnState = 'PLAYING';
        if(Math.random() < 0.3) crates.push(new Crate(Math.random() * canvas.width));
        
        document.getElementById('info').innerText = `TURA: ${currentTeam === 1 ? 'CZERWONI' : 'NIEBIESCY'}`;
        document.getElementById('info').style.color = activePlayer.color;
    }

    function endTurn() {
        if(turnState === 'RESOLVING') return;
        turnState = 'RESOLVING';
        setTimeout(() => {
            currentTeam = currentTeam === 1 ? 2 : 1;
            startTurn();
        }, 1000);
    }

    // --- INPUT HANDLING ---
    const knob = document.getElementById('joystick-knob');
    const joyContainer = document.getElementById('joystick-container');
    
    joyContainer.addEventListener('touchstart', handleJoy);
    joyContainer.addEventListener('touchmove', handleJoy);
    joyContainer.addEventListener('touchend', () => {
        moveDir = 0; knob.style.left = '45px';
    });

    function handleJoy(e) {
        e.preventDefault();
        let rect = joyContainer.getBoundingClientRect();
        let touchX = e.touches[0].clientX - rect.left - 75;
        let limitedX = Math.max(-40, Math.min(40, touchX));
        knob.style.left = (45 + limitedX) + 'px';
        moveDir = limitedX / 40;
    }

    document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        if(activePlayer && activePlayer.grounded && turnState === 'PLAYING') activePlayer.vy = -8;
    });

    let isAiming = false, startAim = {x:0, y:0}, currentAim = {x:0, y:0};
    canvas.addEventListener('touchstart', (e) => {
        if(turnState !== 'PLAYING') return;
        isAiming = true; startAim = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        currentAim = startAim;
    });
    canvas.addEventListener('touchmove', (e) => {
        if(isAiming) currentAim = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    });
    canvas.addEventListener('touchend', () => {
        if(!isAiming) return;
        isAiming = false;
        let vx = (startAim.x - currentAim.x) * 0.2;
        let vy = (startAim.y - currentAim.y) * 0.2;
        if(Math.hypot(vx, vy) > 2) {
            projectiles.push(new Projectile(activePlayer.x, activePlayer.y - 15, vx, vy));
            turnState = 'SHOOTING';
            playSound(300, 'triangle', 0.2, 0.2);
        }
    });

    // --- MAIN LOOP ---
    function loop(time) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(tCanvas, 0, 0);

        if(turnState === 'PLAYING') {
            if(time - lastTick > 1000) {
                timeLeft--; lastTick = time;
                document.getElementById('timer').innerText = timeLeft;
                if(timeLeft <= 10) playSound(800, 'sine', 0.05, 0.05);
                if(timeLeft <= 0) endTurn();
            }
            if(activePlayer) activePlayer.vx = moveDir * 3;
        }

        players.forEach(p => { p.update(); p.draw(); });
        projectiles.forEach((p, i) => { p.update(); p.draw(); if(!p.active) projectiles.splice(i,1); });
        particles.forEach((p, i) => { p.update(); p.draw(); if(p.life <= 0) particles.splice(i,1); });
        crates.forEach(c => { c.update(); c.draw(); });

        if(isAiming && activePlayer) {
            ctx.setLineDash([5, 5]); ctx.strokeStyle = '#fff';
            ctx.beginPath(); ctx.moveTo(activePlayer.x, activePlayer.y - 15);
            ctx.lineTo(activePlayer.x + (startAim.x - currentAim.x), activePlayer.y - 15 + (startAim.y - currentAim.y));
            ctx.stroke(); ctx.setLineDash([]);
        }

        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        generateTerrain();
    });
</script>
</body>
</html>
