<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Worms Mobile Edition 2.0</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none; background-color: #000;
        }
        canvas { display: block; }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white;
            text-shadow: 2px 2px 4px black; pointer-events: none; z-index: 10;
        }
        #timer-display {
            position: absolute; top: 10px; right: 20px; color: white;
            text-shadow: 2px 2px 4px black; font-size: 28px; font-weight: bold;
        }
        /* STEROWANIE MOBILNE */
        #mobile-controls {
            position: absolute; bottom: 20px; left: 0; right: 0;
            width: 100%; height: 150px; pointer-events: none; display: flex;
            justify-content: space-between; align-items: flex-end; padding: 0 20px;
            box-sizing: border-box;
        }
        .joystick-area {
            width: 120px; height: 120px; background: rgba(255,255,255,0.2);
            border-radius: 50%; position: relative; pointer-events: auto;
            border: 2px solid rgba(255,255,255,0.3);
        }
        #joystick-stick {
            width: 50px; height: 50px; background: white; border-radius: 50%;
            position: absolute; top: 35px; left: 35px; box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        #jump-btn {
            width: 80px; height: 80px; background: rgba(255,255,255,0.3);
            border-radius: 50%; color: white; display: flex;
            justify-content: center; align-items: center; font-weight: bold;
            pointer-events: auto; border: 2px solid white; user-select: none;
        }
        #audio-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; color: white;
            z-index: 100; cursor: pointer; text-align: center;
        }
    </style>
</head>
<body>

<div id="audio-overlay" onclick="startAudioContext()">
    <h1>WORMS MOBILE 2.0</h1>
    <p>Dotknij ekranu, aby zacząć</p>
    <small>(Wymagane do aktywacji dźwięku i muzyki)</small>
</div>

<div id="ui">
    <h2 id="turn-indicator">Inicjalizacja...</h2>
    <div id="team-health"></div>
</div>

<div id="timer-display">90</div>

<div id="mobile-controls">
    <div class="joystick-area" id="joy-base">
        <div id="joystick-stick"></div>
    </div>
    <div id="jump-btn">SKOK</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const terrainCanvas = document.createElement('canvas');
    terrainCanvas.width = canvas.width;
    terrainCanvas.height = canvas.height;
    const tCtx = terrainCanvas.getContext('2d');

    // === AUDIO ENGINE ===
    let audioCtx = null;
    function startAudioContext() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        document.getElementById('audio-overlay').style.display = 'none';
        playBackgroundMusic();
    }

    function playTone(freq, type, duration, vol=0.1) {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start();
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
        osc.stop(audioCtx.currentTime + duration);
    }

    function playShoot() { playTone(400, 'triangle', 0.2); }
    function playExplosion() { playTone(100, 'sawtooth', 0.4, 0.3); }
    function playTick() { playTone(1200, 'sine', 0.05, 0.05); }

    function playBackgroundMusic() {
        if (!audioCtx) return;
        let osc = audioCtx.createOscillator();
        let gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(60, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.value = 0.03;
        osc.start();
    }

    // === GAME LOGIC ===
    const gravity = 0.25;
    let players = [], projectiles = [], particles = [], crates = [];
    let currentTeam = 1, currentActivePlayer = null;
    let turnState = 'PLAYING', timeLeft = 90, lastTime = Date.now();
    let moveDir = 0; // -1 lewo, 1 prawo, 0 stop

    class Particle {
        constructor(x, y, color) {
            this.x = x; this.y = y;
            this.vx = (Math.random()-0.5)*8;
            this.vy = (Math.random()-0.5)*8;
            this.life = 30; this.color = color;
        }
        update() { this.x += this.vx; this.y += this.vy; this.life--; }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life/30;
            ctx.fillRect(this.x, this.y, 3, 3);
            ctx.globalAlpha = 1;
        }
    }

    class Crate {
        constructor(x) { this.x = x; this.y = -20; this.vy = 0; this.active = true; }
        update() {
            if (!this.active) return;
            this.vy += gravity; this.y += this.vy;
            if (checkCollision(this.x, this.y + 10)) { this.y -= this.vy; this.vy = 0; }
            players.forEach(p => {
                if (p.hp > 0 && Math.abs(p.x - this.x) < 20 && Math.abs(p.y - this.y) < 20) {
                    p.hp = Math.min(100, p.hp + 40);
                    this.active = false;
                }
            });
        }
        draw() {
            if (!this.active) return;
            ctx.fillStyle = '#ffcc00'; ctx.fillRect(this.x-10, this.y-10, 20, 20);
            ctx.strokeStyle = 'black'; ctx.strokeRect(this.x-10, this.y-10, 20, 20);
        }
    }

    class Player {
        constructor(x, y, team, color) {
            this.x = x; this.y = y; this.team = team; this.color = color;
            this.hp = 100; this.vx = 0; this.vy = 0; this.grounded = false; this.dead = false;
        }
        update() {
            if (this.hp <= 0) { this.dead = true; return; }
            
            let oldVy = this.vy;
            this.vy += gravity;
            this.y += this.vy;
            this.x += this.vx;
            this.vx *= 0.7;

            if (checkCollision(this.x, this.y + 10)) {
                if (oldVy > 7) this.hp -= Math.floor(oldVy * 3); // Fall damage
                this.vy = 0; this.grounded = true;
                while(checkCollision(this.x, this.y + 9)) this.y--;
            } else { this.grounded = false; }

            if (this.hp < 25 && Math.random() < 0.2) {
                particles.push(new Particle(this.x, this.y, 'gray'));
            }
        }
        draw() {
            ctx.fillStyle = this.dead ? '#555' : this.color;
            if (this.dead) { // Nagrobek
                ctx.fillRect(this.x-10, this.y-5, 20, 15);
                ctx.fillRect(this.x-2, this.y-12, 4, 15);
                ctx.fillRect(this.x-6, this.y-8, 12, 4);
                return;
            }
            ctx.beginPath(); ctx.arc(this.x, this.y, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = '12px Arial';
            ctx.fillText(this.hp, this.x - 10, this.y - 15);
            if (currentActivePlayer === this && turnState === 'PLAYING') {
                ctx.fillStyle = 'yellow'; ctx.beginPath();
                ctx.moveTo(this.x, this.y - 25); ctx.lineTo(this.x-5, this.y-35); ctx.lineTo(this.x+5, this.y-35); ctx.fill();
            }
        }
    }

    class Projectile {
        constructor(x, y, vx, vy) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.active = true; }
        update() {
            this.vy += gravity; this.x += this.vx; this.y += this.vy;
            if (checkCollision(this.x, this.y) || this.y > canvas.height) this.explode();
        }
        explode() {
            this.active = false; playExplosion();
            tCtx.globalCompositeOperation = 'destination-out';
            tCtx.beginPath(); tCtx.arc(this.x, this.y, 40, 0, Math.PI*2); tCtx.fill();
            tCtx.globalCompositeOperation = 'source-over';
            for(let i=0; i<15; i++) particles.push(new Particle(this.x, this.y, 'orange'));
            players.forEach(p => {
                let d = Math.hypot(p.x - this.x, p.y - this.y);
                if (d < 50) { p.hp -= Math.floor(50 - d); p.vy = -5; }
            });
            setTimeout(nextTurn, 1500);
        }
        draw() { ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(this.x, this.y, 4, 0, Math.PI*2); ctx.fill(); }
    }

    // === SYSTEM STEROWANIA ===
    const joyBase = document.getElementById('joy-base');
    const joyStick = document.getElementById('joystick-stick');
    const jumpBtn = document.getElementById('jump-btn');

    joyBase.addEventListener('touchstart', handleJoy);
    joyBase.addEventListener('touchmove', handleJoy);
    joyBase.addEventListener('touchend', () => {
        moveDir = 0; joyStick.style.left = '35px'; joyStick.style.top = '35px';
    });

    function handleJoy(e) {
        e.preventDefault();
        let b = joyBase.getBoundingClientRect();
        let touch = e.touches[0];
        let dx = touch.clientX - (b.left + b.width/2);
        let dist = Math.min(Math.abs(dx), 40);
        joyStick.style.left = (35 + (dx > 0 ? dist : -dist)) + 'px';
        moveDir = dx > 10 ? 1 : (dx < -10 ? -1 : 0);
    }

    jumpBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (currentActivePlayer && currentActivePlayer.grounded && turnState === 'PLAYING') {
            currentActivePlayer.vy = -7;
        }
    });

    // Celowanie (proca) - na reszcie ekranu
    let isAiming = false, dragS = {x:0, y:0}, dragC = {x:0, y:0};
    canvas.addEventListener('touchstart', (e) => {
        if (turnState !== 'PLAYING') return;
        isAiming = true; dragS = {x: e.touches[0].clientX, y: e.touches[0].clientY};
        dragC = dragS;
    });
    canvas.addEventListener('touchmove', (e) => {
        if (isAiming) dragC = {x: e.touches[0].clientX, y: e.touches[0].clientY};
    });
    canvas.addEventListener('touchend', () => {
        if (!isAiming) return;
        isAiming = false;
        let vx = (dragS.x - dragC.x) * 0.15;
        let vy = (dragS.y - dragC.y) * 0.15;
        if (Math.hypot(vx, vy) > 1) {
            projectiles.push(new Projectile(currentActivePlayer.x, currentActivePlayer.y - 10, vx, vy));
            turnState = 'RESOLVING'; playShoot();
        }
    });

    function checkCollision(x, y) {
        if (x < 0 || x > canvas.width || y < 0 || y > canvas.height) return false;
        return tCtx.getImageData(x, y, 1, 1).data[3] > 0;
    }

    function generateTerrain() {
        tCtx.fillStyle = '#2d5a27';
        tCtx.beginPath(); tCtx.moveTo(0, canvas.height);
        for(let x=0; x<=canvas.width; x+=10) {
            tCtx.lineTo(x, canvas.height - 150 - Math.sin(x/100)*60 - Math.cos(x/50)*20);
        }
        tCtx.lineTo(canvas.width, canvas.height); tCtx.fill();
    }

    function nextTurn() {
        currentTeam = currentTeam === 1 ? 2 : 1;
        let team = players.filter(p => p.team === currentTeam && !p.dead);
        if (team.length === 0) { alert("KONIEC GRY!"); location.reload(); return; }
        currentActivePlayer = team[Math.floor(Math.random()*team.length)];
        timeLeft = 90; turnState = 'PLAYING';
        if (Math.random() < 0.4) crates.push(new Crate(Math.random()*canvas.width));
        updateUI();
    }

    function updateUI() {
        let ind = document.getElementById('turn-indicator');
        ind.innerText = `Tura: ${currentTeam === 1 ? 'CZERWONI' : 'NIEBIESCY'}`;
        ind.style.color = currentTeam === 1 ? '#ff4444' : '#4444ff';
    }

    function loop() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        ctx.drawImage(terrainCanvas, 0, 0);

        if (turnState === 'PLAYING') {
            if (Date.now() - lastTime > 1000) {
                timeLeft--; lastTime = Date.now();
                document.getElementById('timer-display').innerText = timeLeft;
                if (timeLeft < 10) playTick();
                if (timeLeft <= 0) nextTurn();
            }
            if (currentActivePlayer) currentActivePlayer.vx = moveDir * 2.5;
        }

        players.forEach(p => { p.update(); p.draw(); });
        projectiles.forEach((p, i) => { p.update(); p.draw(); if(!p.active) projectiles.splice(i,1); });
        particles.forEach((p, i) => { p.update(); p.draw(); if(p.life<=0) particles.splice(i,1); });
        crates.forEach(c => { c.update(); c.draw(); });

        if (isAiming && currentActivePlayer) {
            ctx.strokeStyle = 'white'; ctx.setLineDash([5, 5]);
            ctx.beginPath(); ctx.moveTo(currentActivePlayer.x, currentActivePlayer.y-10);
            ctx.lineTo(currentActivePlayer.x + (dragS.x - dragC.x), currentActivePlayer.y-10 + (dragS.y - dragC.y));
            ctx.stroke(); ctx.setLineDash([]);
        }
        requestAnimationFrame(loop);
    }

    generateTerrain();
    for(let i=0; i<3; i++) players.push(new Player(100+i*50, 50, 1, '#ff4444'));
    for(let i=0; i<3; i++) players.push(new Player(canvas.width-200+i*50, 50, 2, '#4444ff'));
    nextTurn();
    loop();

</script>
</body>
</html>
