<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Focus Timer</title>
    <style>
        :root {
            --primary: #0984e3; /* Nowy kolor niebieski */
            --secondary: #00cec9;
            --bg: #f0f2f5;
            --text: #2d3436;
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text);
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 2.5rem 2rem;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .settings {
            margin-bottom: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .settings label {
            font-size: 0.9rem;
            color: #636e72;
        }

        .settings input {
            width: 80px;
            padding: 8px;
            border: 2px solid #dfe6e9;
            border-radius: 12px;
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            outline: none;
            transition: border-color 0.3s;
        }

        .settings input:focus {
            border-color: var(--primary);
        }

        .modes {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 1.5rem;
        }

        .mode-btn {
            border: none;
            background: #f1f2f6;
            padding: 10px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            color: #7f8c8d;
        }

        .mode-btn.active {
            background: var(--primary);
            color: white;
        }

        .timer-display {
            font-size: 5.5rem;
            font-weight: 800;
            margin-bottom: 2rem;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-btn {
            border: none;
            padding: 18px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s, background 0.3s, box-shadow 0.3s;
        }

        #startPause {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 20px rgba(9, 132, 227, 0.3);
        }

        #reset {
            background: #dfe6e9;
            color: #2d3436;
        }

        .main-btn:active {
            transform: scale(0.97);
        }

        @media (max-width: 400px) {
            .timer-display { font-size: 4.5rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Focus Blue</h1>
        
        <div class="settings">
            <label for="minutesInput">Ustaw minuty:</label>
            <input type="number" id="minutesInput" value="25" min="1" max="999">
        </div>

        <div class="modes">
            <button class="mode-btn active" id="workBtn" onclick="changeMode('work')">Praca</button>
            <button class="mode-btn" id="breakBtn" onclick="changeMode('break')">Przerwa</button>
        </div>

        <div class="timer-display" id="timer">25:00</div>

        <div class="controls">
            <button class="main-btn" id="startPause">START</button>
            <button class="main-btn" id="reset">Resetuj</button>
        </div>
    </div>

    <audio id="alarm" preload="auto">
        <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
    </audio>

    <script>
        let timeLeft;
        let timerId = null;
        let currentMode = 'work';

        const timerDisplay = document.getElementById('timer');
        const startPauseBtn = document.getElementById('startPause');
        const resetBtn = document.getElementById('reset');
        const minutesInput = document.getElementById('minutesInput');
        const alarm = document.getElementById('alarm');

        function initTimer() {
            timeLeft = parseInt(minutesInput.value) * 60;
            updateDisplay();
        }

        function changeMode(mode) {
            currentMode = mode;
            stopTimer();
            
            if (mode === 'work') {
                minutesInput.value = 25;
                document.getElementById('workBtn').classList.add('active');
                document.getElementById('breakBtn').classList.remove('active');
                document.documentElement.style.setProperty('--primary', '#0984e3');
            } else {
                minutesInput.value = 5;
                document.getElementById('breakBtn').classList.add('active');
                document.getElementById('workBtn').classList.remove('active');
                document.documentElement.style.setProperty('--primary', '#00cec9');
            }
            initTimer();
        }

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            const timeString = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            timerDisplay.innerText = timeString;
            document.title = `${timeString} - Timer`;
        }

        function stopTimer() {
            clearInterval(timerId);
            timerId = null;
            startPauseBtn.innerText = 'START';
        }

        function startPause() {
            if (timerId) {
                stopTimer();
            } else {
                startPauseBtn.innerText = 'PAUZA';
                timerId = setInterval(() => {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        stopTimer();
                        alarm.play();
                        alert('Czas minął!');
                        resetToDefault();
                    }
                }, 1000);
            }
        }

        function resetToDefault() {
            stopTimer();
            initTimer();
        }

        // Event Listeners
        startPauseBtn.addEventListener('click', startPause);
        resetBtn.addEventListener('click', resetToDefault);
        
        minutesInput.addEventListener('input', () => {
            if (!timerId) {
                initTimer();
            }
        });

        // Start
        initTimer();
    </script>
</body>
</html>
