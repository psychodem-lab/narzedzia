<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduMapa - Baza Wiedzy i Mapa Myśli</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        #network-container { width: 100%; height: 100%; background: #f8fafc; cursor: grab; }
        #network-container:active { cursor: grabbing; }
        
        /* Stylizacja paska przewijania dla panelu bocznego */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        /* Wymuszenie zawijania tekstu w notatkach */
        .content-display { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="bg-slate-100 font-sans text-slate-900 h-screen flex flex-col">

    <header class="bg-indigo-900 text-white p-3 shadow-md border-b-4 border-indigo-500 z-20 flex-shrink-0 relative">
        <div class="w-full flex justify-between items-center px-4">
            <h1 class="text-xl font-black uppercase tracking-tighter flex items-center gap-2">
                <svg class="w-6 h-6 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                Edu<span class="text-indigo-400">Mapa</span>
            </h1>
            <div class="flex gap-3 items-center">
                <button onclick="exportData()" class="text-xs bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded font-bold uppercase transition shadow-sm">Zapisz na dysk (JSON)</button>
                <label class="text-xs bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded font-bold cursor-pointer uppercase transition shadow-sm">
                    Wczytaj mapę <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                </label>
                <div class="w-px h-6 bg-indigo-700 mx-2"></div>
                <button id="learningModeBtn" onclick="toggleLearningMode()" class="text-xs bg-emerald-600 hover:bg-emerald-500 px-4 py-2 rounded font-bold uppercase transition shadow-sm text-white">
                    Tryb Nauki
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        
        <div class="flex-1 relative border-r border-slate-300 shadow-inner">
            <div id="network-container"></div>
            
            <div id="tools-panel" class="absolute bottom-6 left-6 bg-white p-3 rounded-xl shadow-lg border border-slate-200 flex gap-2 transition-opacity">
                <button onclick="network.fit()" class="p-2 bg-slate-100 hover:bg-slate-200 rounded text-slate-700 text-xs font-bold transition" title="Wyśrodkuj widok">Wyśrodkuj</button>
                <div class="w-px bg-slate-300 mx-1"></div>
                <button onclick="deleteSelected()" class="p-2 bg-red-50 hover:bg-red-100 text-red-600 rounded text-xs font-bold transition">Usuń zaznaczone</button>
            </div>

            <div id="learning-modal" class="hidden absolute inset-0 z-50 flex items-center justify-center bg-slate-900/40 backdrop-blur-sm transition-all" onclick="closeLearningModal(event)">
                <div class="bg-white rounded-2xl shadow-2xl w-[700px] max-w-[90%] max-h-[80vh] flex flex-col transform transition-transform" onclick="event.stopPropagation()">
                    <div class="p-6 border-b border-slate-200 flex justify-between items-center bg-indigo-50 rounded-t-2xl">
                        <h2 id="learning-modal-title" class="text-xl font-black text-indigo-900"></h2>
                        <div class="flex items-center gap-3">
                            <button id="btn-collapse-learn" onclick="toggleCollapseNode(currentNodeId)" class="hidden items-center gap-1 text-xs bg-indigo-200 text-indigo-800 hover:bg-indigo-300 px-3 py-1.5 rounded font-bold uppercase transition shadow-sm border border-indigo-300">
                                </button>
                            <button onclick="closeLearningModal()" class="text-slate-400 hover:text-red-500 transition p-1 bg-white rounded-full shadow-sm">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                        </div>
                    </div>
                    <div class="p-8 overflow-y-auto custom-scrollbar flex-1">
                        <div id="learning-modal-content" class="content-display text-slate-700 text-lg leading-relaxed"></div>
                    </div>
                </div>
            </div>
        </div>

        <aside id="sidebar" class="w-[400px] bg-white flex flex-col shadow-[-4px_0_15px_rgba(0,0,0,0.05)] z-10 flex-shrink-0 transition-all duration-300">
            
            <div class="p-5 border-b border-slate-200 bg-slate-50">
                <h2 class="text-xs font-black text-slate-500 uppercase mb-3 tracking-widest">Dodaj Nowe Pojęcie</h2>
                <input type="text" id="newNodeTitle" placeholder="Tytuł (np. Psychoterapia)" class="w-full p-2.5 mb-2 border border-slate-300 rounded bg-white text-sm outline-none focus:ring-2 ring-indigo-400">
                <button onclick="addNewNode()" class="w-full bg-indigo-600 text-white font-bold py-2.5 rounded hover:bg-indigo-700 transition shadow text-sm">
                    Dodaj pojęcie
                </button>
                <p id="add-hint" class="text-[10px] text-slate-400 mt-2 italic text-center">
                    Kliknij węzeł na mapie, aby dodać pojęcie jako jego podkategorię.
                </p>
            </div>

            <div id="node-details-panel" class="flex-1 overflow-y-auto custom-scrollbar p-5 hidden flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xs font-black text-indigo-600 uppercase tracking-widest">Szczegóły Pojęcia</h2>
                    <span id="node-id-display" class="text-[9px] text-slate-400 font-mono"></span>
                </div>

                <label class="text-[10px] font-bold uppercase text-slate-400 mb-1">Tytuł na mapie:</label>
                <input type="text" id="editNodeTitle" class="w-full p-2.5 mb-4 border border-slate-300 rounded bg-white text-sm outline-none focus:border-indigo-500 font-bold">

                <label class="text-[10px] font-bold uppercase text-slate-400 mb-1">Rozwinięcie / Notatki:</label>
                <textarea id="editNodeContent" rows="12" placeholder="Wpisz definicje, zasady, rozszerzone informacje..." class="w-full p-3 mb-4 border border-slate-300 rounded bg-white text-sm outline-none focus:border-indigo-500 custom-scrollbar resize-y leading-relaxed text-slate-700"></textarea>

                <div class="mb-6">
                    <label class="text-[10px] font-bold uppercase text-slate-400 mb-1 block">Kolor węzła:</label>
                    <div class="flex gap-2">
                        <button onclick="changeNodeColor('#6366f1')" class="w-6 h-6 rounded-full bg-indigo-500 hover:ring-2 ring-offset-1 ring-indigo-500 transition"></button>
                        <button onclick="changeNodeColor('#10b981')" class="w-6 h-6 rounded-full bg-emerald-500 hover:ring-2 ring-offset-1 ring-emerald-500 transition"></button>
                        <button onclick="changeNodeColor('#f59e0b')" class="w-6 h-6 rounded-full bg-amber-500 hover:ring-2 ring-offset-1 ring-amber-500 transition"></button>
                        <button onclick="changeNodeColor('#ef4444')" class="w-6 h-6 rounded-full bg-red-500 hover:ring-2 ring-offset-1 ring-red-500 transition"></button>
                        <button onclick="changeNodeColor('#8b5cf6')" class="w-6 h-6 rounded-full bg-purple-500 hover:ring-2 ring-offset-1 ring-purple-500 transition"></button>
                        <button onclick="changeNodeColor('#64748b')" class="w-6 h-6 rounded-full bg-slate-500 hover:ring-2 ring-offset-1 ring-slate-500 transition"></button>
                    </div>
                </div>

                <div class="mt-auto space-y-2">
                    <button id="btn-collapse-edit" onclick="toggleCollapseNode(currentNodeId)" class="w-full bg-indigo-100 text-indigo-800 font-bold py-2 rounded hover:bg-indigo-200 transition shadow-sm text-xs uppercase hidden items-center justify-center gap-1 border border-indigo-300">
                        </button>
                    <button onclick="saveNodeChanges()" class="w-full bg-slate-900 text-white font-bold py-3 rounded hover:bg-black transition shadow-lg text-sm uppercase">Zapisz Zmiany</button>
                    <button onclick="deselectCurrentNode()" class="w-full bg-white text-slate-500 border border-slate-300 font-bold py-2 rounded hover:bg-slate-50 transition text-xs uppercase">Anuluj</button>
                </div>
            </div>

            <div id="empty-state-panel" class="flex-1 flex flex-col items-center justify-center p-8 text-center text-slate-400">
                <svg class="w-16 h-16 mb-4 text-slate-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                <p class="text-sm">Kliknij na dowolny węzeł na mapie, aby przeczytać jego treść i rozpocząć edycję.</p>
                <p class="text-[11px] mt-4 bg-slate-100 p-2 rounded w-full border border-slate-200">Wskazówka: Użyj <strong>dwukliku</strong> na węźle, aby szybko zwinąć lub rozwinąć jego podkategorie.</p>
            </div>

        </aside>
    </main>

    <script>
        // Inicjalizacja danych strukturalnych - węzły z opcją collapsed
        let nodes = new vis.DataSet([
            { id: 1, label: 'Psychologia', content: 'Nauka badająca mechanizmy i prawa rządzące psychiką oraz zachowaniami człowieka.', color: '#6366f1', x: 0, y: 0, collapsed: false },
            { id: 2, label: 'Psychoterapia', content: 'Metoda leczenia zaburzeń psychicznych i rozwiązywania problemów emocjonalnych za pomocą środków psychologicznych.', color: '#10b981', x: -150, y: 150, collapsed: false },
            { id: 3, label: 'Psychologia Poznawcza', content: 'Dział psychologii zajmujący się badaniem procesów i struktur poznawczych (uwaga, pamięć, myślenie).', color: '#f59e0b', x: 150, y: 150, collapsed: false }
        ]);
        
        let edges = new vis.DataSet([
            { from: 1, to: 2, arrows: 'to' },
            { from: 1, to: 3, arrows: 'to' }
        ]);

        const container = document.getElementById('network-container');
        const data = { nodes: nodes, edges: edges };
        
        // Konfiguracja wyglądu mapy
        const options = {
            nodes: {
                shape: 'box',
                margin: 12,
                font: { size: 14, face: 'Inter, sans-serif', color: '#ffffff', bold: true },
                borderWidth: 0,
                shadow: { enabled: true, color: 'rgba(0,0,0,0.15)', size: 10, x: 2, y: 3 },
                widthConstraint: { maximum: 200 }
            },
            edges: {
                color: { color: '#94a3b8', highlight: '#6366f1' },
                width: 2,
                smooth: { type: 'continuous', roundness: 0.5 },
                arrows: { to: { enabled: true, scaleFactor: 0.8 } }
            },
            physics: {
                enabled: false // Zatrzymuje "pływanie" węzłów
            },
            interaction: { hover: true, selectConnectedEdges: false, dragNodes: true }
        };

        const network = new vis.Network(container, data, options);

        let currentNodeId = null;
        let isLearningMode = false;

        // --- ZWIJANIE I ROZWIJANIE HIERARCHII ---

        function toggleCollapseNode(nodeId) {
            if (!nodeId) return;
            const node = nodes.get(nodeId);
            if (!node) return;

            const childrenEdges = edges.get({ filter: e => e.from === nodeId });
            if (childrenEdges.length === 0) return; // Nie ma co zwijać

            const isCollapsed = !node.collapsed;
            
            // Pobranie koloru bazowego węzła, by dopasować kolor
            let bgColor = typeof node.color === 'string' ? node.color : (node.color?.background || '#6366f1');

            // Aktualizacja węzła o status i wskaźnik wizualny
            nodes.update({
                id: nodeId,
                collapsed: isCollapsed,
                borderWidth: isCollapsed ? 4 : 0,
                color: {
                    background: bgColor,
                    border: isCollapsed ? '#1e293b' : 'transparent', // Ciemna ramka jeśli zwinięte
                    highlight: {
                        background: bgColor,
                        border: isCollapsed ? '#1e293b' : '#ffffff'
                    }
                },
                shapeProperties: { borderDashes: isCollapsed ? [6, 4] : false } // Przerywana ramka jeśli zwinięte
            });

            updateVisibility();
            updateCollapseButtons(nodeId);
        }

        function updateVisibility() {
            let allNodes = nodes.get();
            let hiddenSet = new Set();
            let collapsedNodes = allNodes.filter(n => n.collapsed);

            // Rekursywnie znajdź wszystkie ukryte węzły podległe pod zwinięte
            collapsedNodes.forEach(cNode => {
                let descendants = getAllDescendants(cNode.id);
                descendants.forEach(dId => hiddenSet.add(dId));
            });

            // Aktualizacja tylko węzłów, którym zmienił się status
            let updates = [];
            allNodes.forEach(n => {
                let shouldBeHidden = hiddenSet.has(n.id);
                if (n.hidden !== shouldBeHidden) {
                    updates.push({ id: n.id, hidden: shouldBeHidden });
                }
            });

            if (updates.length > 0) {
                nodes.update(updates);
            }
        }

        function getAllDescendants(nodeId, visited = new Set()) {
            let descendants = [];
            let childEdges = edges.get({ filter: e => e.from === nodeId });
            childEdges.forEach(e => {
                if (!visited.has(e.to)) {
                    visited.add(e.to);
                    descendants.push(e.to);
                    descendants = descendants.concat(getAllDescendants(e.to, visited));
                }
            });
            return descendants;
        }

        function updateCollapseButtons(nodeId) {
            const btnEdit = document.getElementById('btn-collapse-edit');
            const btnLearn = document.getElementById('btn-collapse-learn');
            if (!nodeId || (!btnEdit && !btnLearn)) return;

            const node = nodes.get(nodeId);
            const children = edges.get({ filter: e => e.from === nodeId });
            const hasChildren = children.length > 0;

            const icon = node.collapsed ? '🔽' : '🔼';
            const text = node.collapsed ? 'Rozwiń podkategorie' : 'Zwiń podkategorie';
            const content = `<span class="text-base leading-none">${icon}</span> ${text}`;

            if (btnEdit) {
                btnEdit.style.display = hasChildren ? 'flex' : 'none';
                btnEdit.innerHTML = content;
            }
            if (btnLearn) {
                btnLearn.style.display = hasChildren ? 'flex' : 'none';
                btnLearn.innerHTML = content;
            }
        }

        // Obsługa dwukliku do szybkiego zwijania
        network.on("doubleClick", function (params) {
            if (params.nodes.length > 0) {
                toggleCollapseNode(params.nodes[0]);
            }
        });

        // --- GŁÓWNA LOGIKA INTERFEJSU ---

        network.on("selectNode", function (params) {
            const nodeId = params.nodes[0];
            currentNodeId = nodeId;
            
            updateCollapseButtons(nodeId);

            if (isLearningMode) {
                const node = nodes.get(nodeId);
                document.getElementById('learning-modal-title').innerText = node.label || 'Brak tytułu';
                document.getElementById('learning-modal-content').innerText = node.content || 'Brak notatek dla tego pojęcia.';
                document.getElementById('learning-modal').classList.remove('hidden');
            } else {
                openNodeDetails(nodeId);
                const parentNode = nodes.get(nodeId);
                document.getElementById('add-hint').innerHTML = `Zostanie dodane jako podkategoria dla: <strong class="text-indigo-600">${parentNode.label}</strong>`;
            }
        });

        network.on("deselectNode", function () {
            if (!isLearningMode) {
                deselectCurrentNode();
            }
        });

        function openNodeDetails(nodeId) {
            currentNodeId = nodeId;
            const node = nodes.get(nodeId);
            
            document.getElementById('editNodeTitle').value = node.label || '';
            document.getElementById('editNodeContent').value = node.content || '';
            document.getElementById('node-id-display').innerText = `ID: ${node.id}`;

            document.getElementById('empty-state-panel').classList.add('hidden');
            document.getElementById('node-details-panel').classList.remove('hidden');
            document.getElementById('node-details-panel').classList.add('flex');
        }

        function deselectCurrentNode() {
            currentNodeId = null;
            network.unselectAll();
            
            document.getElementById('node-details-panel').classList.add('hidden');
            document.getElementById('node-details-panel').classList.remove('flex');
            document.getElementById('empty-state-panel').classList.remove('hidden');
            document.getElementById('add-hint').innerHTML = `Kliknij węzeł na mapie, aby dodać pojęcie jako jego podkategoria.<br>Jeśli nic nie zaznaczysz, utworzysz nowy główny węzeł.`;
        }

        // --- TRYB NAUKI ---

        function toggleLearningMode() {
            isLearningMode = !isLearningMode;
            const sidebar = document.getElementById('sidebar');
            const toolsPanel = document.getElementById('tools-panel');
            const btn = document.getElementById('learningModeBtn');

            if (isLearningMode) {
                sidebar.classList.add('hidden');
                toolsPanel.classList.add('hidden');
                
                btn.innerText = "Wyjdź z trybu nauki";
                btn.classList.remove('bg-emerald-600', 'hover:bg-emerald-500');
                btn.classList.add('bg-red-500', 'hover:bg-red-400');
                
                deselectCurrentNode();
                network.setOptions({ interaction: { dragNodes: false } }); 
            } else {
                sidebar.classList.remove('hidden');
                toolsPanel.classList.remove('hidden');
                
                btn.innerText = "Tryb Nauki";
                btn.classList.remove('bg-red-500', 'hover:bg-red-400');
                btn.classList.add('bg-emerald-600', 'hover:bg-emerald-500');
                
                closeLearningModal();
                network.setOptions({ interaction: { dragNodes: true } });
            }
            setTimeout(() => network.fit(), 100); 
        }

        function closeLearningModal(e) {
            document.getElementById('learning-modal').classList.add('hidden');
            if (isLearningMode) {
                network.unselectAll(); 
            }
        }

        // --- AKCJE NA DANYCH ---

        function addNewNode() {
            if (isLearningMode) return; 

            const titleInput = document.getElementById('newNodeTitle');
            const title = titleInput.value.trim();
            
            if (!title) {
                alert("Wpisz tytuł pojęcia!");
                return;
            }

            const newNodeId = Date.now(); 
            const selectedNodes = network.getSelectedNodes();
            let newX, newY;
            
            if (selectedNodes.length > 0) {
                const parentId = selectedNodes[0];
                const pos = network.getPositions([parentId])[parentId];
                newX = pos.x + (Math.random() * 80 - 40) + 150; 
                newY = pos.y + (Math.random() * 80 - 40) + 100;
            } else {
                const viewCenter = network.getViewPosition();
                newX = viewCenter.x + (Math.random() * 50 - 25);
                newY = viewCenter.y + (Math.random() * 50 - 25);
            }
            
            nodes.add({
                id: newNodeId,
                label: title,
                content: '',
                color: '#6366f1',
                x: newX,
                y: newY,
                collapsed: false
            });

            if (selectedNodes.length > 0) {
                const parentId = selectedNodes[0];
                edges.add({
                    from: parentId,
                    to: newNodeId,
                    arrows: 'to'
                });
                
                // Aktualizujemy przycisk u rodzica (bo właśnie dostał dziecko)
                updateCollapseButtons(parentId);
            }

            titleInput.value = '';
            
            // Ukrywamy nowy węzeł od razu, jeśli rodzic był zwinięty
            updateVisibility(); 

            network.selectNodes([newNodeId]);
            openNodeDetails(newNodeId);
        }

        function saveNodeChanges() {
            if (!currentNodeId) return;

            const newTitle = document.getElementById('editNodeTitle').value;
            const newContent = document.getElementById('editNodeContent').value;

            nodes.update({
                id: currentNodeId,
                label: newTitle,
                content: newContent
            });
            
            const btn = document.querySelector('button[onclick="saveNodeChanges()"]');
            const originalText = btn.innerText;
            btn.innerText = "Zapisano ✓";
            btn.classList.add('bg-emerald-600');
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove('bg-emerald-600');
            }, 1000);
        }

        function changeNodeColor(hexColor) {
            if (!currentNodeId) return;
            const node = nodes.get(currentNodeId);
            const isCollapsed = node.collapsed || false;

            nodes.update({
                id: currentNodeId,
                color: {
                    background: hexColor,
                    border: isCollapsed ? '#1e293b' : 'transparent',
                    highlight: {
                        background: hexColor,
                        border: isCollapsed ? '#1e293b' : '#ffffff'
                    }
                }
            });
        }

        function deleteSelected() {
            if (isLearningMode) return; 

            const selectedNodes = network.getSelectedNodes();
            const selectedEdges = network.getSelectedEdges();
            
            if (selectedNodes.length === 0 && selectedEdges.length === 0) {
                alert("Wybierz pojęcie lub połączenie do usunięcia.");
                return;
            }

            if (confirm("Czy na pewno chcesz usunąć zaznaczone elementy?")) {
                if (selectedNodes.length > 0) nodes.remove(selectedNodes);
                if (selectedEdges.length > 0) edges.remove(selectedEdges);
                deselectCurrentNode();
                updateVisibility(); // Usunięcie może wpłynąć na widoczność osieroconych węzłów
            }
        }

        // --- IMPORT / EKSPORT ---

        function exportData() {
            const positions = network.getPositions();
            const nodesData = nodes.get().map(node => {
                let exportNode = { ...node };
                if (positions[node.id]) {
                    exportNode.x = positions[node.id].x;
                    exportNode.y = positions[node.id].y;
                }
                return exportNode;
            });
            
            const dataToExport = JSON.stringify({ nodes: nodesData, edges: edges.get() });
            const blob = new Blob([dataToExport], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `EduMapa-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    nodes.clear();
                    edges.clear();
                    deselectCurrentNode();
                    
                    nodes.add(imported.nodes);
                    edges.add(imported.edges);
                    updateVisibility(); // Upewnij się, że stan zwiniętych węzłów po wgraniu jest poprawny
                    setTimeout(() => network.fit(), 200);
                } catch (error) {
                    alert("Błąd odczytu pliku. Upewnij się, że to poprawny plik EduMapy.");
                }
            };
            reader.readAsText(e.target.files[0]);
            e.target.value = '';
        }

        // Obsługa klawiszy
        window.addEventListener('keydown', function(e) {
            if (e.key === "Delete" && !isLearningMode) {
                if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                    deleteSelected();
                }
            }
            if (e.key === "Escape" && isLearningMode) {
                closeLearningModal();
            }
        });
    </script>
</body>
</html>
