<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Warzone Tactical - Pro Edition</title>
    <style>
        :root {
            --ui-blue: #00d4ff;
            --ui-red: #ff2e63;
            --ui-bg: rgba(10, 10, 20, 0.6);
            --font-main: 'Segoe UI', Tahoma, sans-serif;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #020205; font-family: var(--font-main);
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        canvas { display: block; width: 100vw; height: 100vh; }

        /* UI OVERLAY - ZMNIEJSZONY PANEL */
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 10; padding: 10px 15px; box-sizing: border-box;
        }
        .top-bar { display: flex; justify-content: space-between; align-items: center; }
        
        /* Zmniejszony panel lewy */
        .team-stats { 
            background: var(--ui-bg); 
            padding: 6px 12px; 
            border-radius: 8px; 
            border-left: 3px solid var(--ui-blue); 
            backdrop-filter: blur(8px);
            min-width: 120px;
        }
        .team-stats h2 { 
            margin: 0; 
            font-size: 13px; 
            text-transform: uppercase; 
            color: #fff; 
            letter-spacing: 1px;
        }
        #wind-meter { font-size: 10px; color: #00ffcc; margin-top: 2px; font-weight: bold; }

        /* Timer */
        #timer { 
            font-size: 32px; 
            font-weight: 900; 
            color: #fff; 
            text-shadow: 0 0 10px var(--ui-blue);
            background: rgba(0,0,0,0.3);
            padding: 0 15px;
            border-radius: 10px;
        }

        /* STEROWANIE MOBILNE */
        .controls {
            position: absolute; bottom: 20px; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: flex-end;
            padding: 0 30px; pointer-events: none;
        }
        .joystick-base {
            width: 110px; height: 110px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 50%;
            position: relative; pointer-events: auto;
        }
        #joystick-knob {
            width: 45px; height: 45px; background: rgba(255,255,255,0.8); border-radius: 50%;
            position: absolute; top: 32.5px; left: 32.5px; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        /* Przezroczysty przycisk skoku */
        #jump-btn {
            width: 80px; height: 80px; 
            background: rgba(255, 46, 99, 0.15); /* Duża przezroczystość */
            border: 2px solid rgba(255, 255, 255, 0.3); 
            border-radius: 50%; pointer-events: auto;
            display: flex; justify-content: center; align-items: center;
            color: rgba(255,255,255,0.6); font-weight: 900; font-size: 14px;
            backdrop-filter: blur(2px);
        }

        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #05050a; z-index: 1000; display: flex; 
            flex-direction: column; justify-content: center; align-items: center; color: white;
        }
        #start-screen h1 { font-size: 3rem; margin: 0; color: var(--ui-blue); text-shadow: 0 0 20px var(--ui-blue); }
        
        @media (orientation: portrait) {
            #rotate-hint { display: flex !important; }
        }
        #rotate-hint {
            position: fixed; top:0; left:0; width:100%; height:100%; background:#000;
            z-index: 9999; display:none; flex-direction:column; justify-content:center; align-items:center; color:#fff;
        }
    </style>
</head>
<body>

<div id="rotate-hint"><h1>OBRÓĆ TELEFON 📱</h1></div>

<div id="start-screen" onclick="init()">
    <h1>WARZONE</h1>
    <p style="letter-spacing: 3px; color: #555;">KLIKNIJ, ABY ZACZĄĆ</p>
</div>

<div id="hud">
    <div class="top-bar">
        <div class="team-stats">
            <h2 id="active-player-name">INICJALIZACJA...</h2>
            <div id="wind-meter">WIATR: 0.0</div>
        </div>
        <div id="timer">60</div>
    </div>
</div>

<div class="controls">
    <div class="joystick-base" id="joy-base">
        <div id="joystick-knob"></div>
    </div>
    <div id="jump-btn">JUMP</div>
</div>

<canvas id="gameCanvas"></canvas>

<script>
/**
 * KONFIGURACJA
 */
const CONFIG = {
    zoom: 0.55,           // Zmniejszony zoom, aby widzieć więcej (rozwiązuje problem "za dużych" elementów)
    gravity: 0.24,
    windMax: 0.12,
    turnTime: 60,
    friction: 0.88,
    explosionPower: 65,
    pixelRatio: window.devicePixelRatio || 1
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const tCanvas = document.createElement('canvas'); // Ukryty canvas terenu
const tCtx = tCanvas.getContext('2d');

let game = {
    running: false,
    players: [],
    projectiles: [],
    particles: [],
    wind: 0,
    activePlayer: null,
    timeLeft: CONFIG.turnTime,
    lastTime: 0,
    inputX: 0,
    isAiming: false,
    aimStart: {x:0, y:0},
    aimEnd: {x:0, y:0},
    turnState: 'PLAYING'
};

/**
 * KLASA GRACZA - Z MINKAMI
 */
class Player {
    constructor(x, team, color, name) {
        this.x = x;
        this.y = 0; // Ustawiane przez spawn
        this.vx = 0; this.vy = 0;
        this.hp = 100;
        this.team = team;
        this.color = color;
        this.name = name;
        this.radius = 16;
        this.grounded = false;
        this.dead = false;
        this.face = Math.floor(Math.random() * 4); // 0: radosny, 1: zły, 2: zdziwiony, 3: spokojny
    }

    update() {
        if(this.dead) return;
        
        this.vy += CONFIG.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= CONFIG.friction;

        // Kolizja z terenem
        if(checkTerrain(this.x, this.y + this.radius)) {
            this.vy = 0;
            this.grounded = true;
            while(checkTerrain(this.x, this.y + this.radius - 1)) this.y--;
        } else {
            this.grounded = false;
        }

        if(this.hp <= 0 || this.y > tCanvas.height) {
            this.hp = 0; this.dead = true;
            if(game.activePlayer === this) nextTurn();
        }
    }

    draw() {
        if(this.dead) {
            ctx.fillStyle = '#444'; ctx.fillRect(this.x-10, this.y-5, 20, 25); // Nagrobek
            return;
        }

        // Ciało
        ctx.fillStyle = this.color;
        ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.stroke();

        // RYSOWANIE MINKI
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.lineCap = 'round';
        
        // Oczy
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(this.x - 5, this.y - 3, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(this.x + 5, this.y - 3, 2, 0, Math.PI*2); ctx.fill();

        // Buzia zależna od minki
        ctx.beginPath();
        if(this.face === 0) { // Uśmiech
            ctx.arc(this.x, this.y + 2, 5, 0, Math.PI);
        } else if(this.face === 1) { // Zły
            ctx.moveTo(this.x - 4, this.y + 5); ctx.lineTo(this.x + 4, this.y + 5);
            ctx.moveTo(this.x - 6, this.y - 8); ctx.lineTo(this.x - 2, this.y - 5);
            ctx.moveTo(this.x + 6, this.y - 8); ctx.lineTo(this.x + 2, this.y - 5);
        } else if(this.face === 2) { // Zdziwiony
            ctx.arc(this.x, this.y + 5, 2, 0, Math.PI*2);
        } else { // Spokojny
            ctx.moveTo(this.x - 3, this.y + 4); ctx.lineTo(this.x + 3, this.y + 4);
        }
        ctx.stroke();

        // HP Bar
        ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(this.x - 20, this.y - 35, 40, 4);
        ctx.fillStyle = this.hp > 30 ? '#00ff00' : '#ff0000';
        ctx.fillRect(this.x - 20, this.y - 35, (this.hp/100)*40, 4);
        
        if(game.activePlayer === this) {
            ctx.fillStyle = 'yellow';
            ctx.beginPath(); ctx.moveTo(this.x, this.y - 50); ctx.lineTo(this.x-5, this.y-60); ctx.lineTo(this.x+5, this.y-60); ctx.fill();
        }
    }
}

/**
 * LOGIKA TERENU I SPAWNOWANIA
 */
function generateTerrain() {
    tCanvas.width = window.innerWidth / CONFIG.zoom;
    tCanvas.height = window.innerHeight / CONFIG.zoom;
    
    tCtx.fillStyle = '#2d5a27'; // Kolor trawy
    tCtx.beginPath();
    tCtx.moveTo(0, tCanvas.height);
    
    let seed = Math.random() * 1000;
    for(let x=0; x <= tCanvas.width; x += 10) {
        let y = tCanvas.height * 0.7 + Math.sin(x*0.005 + seed)*150 + Math.sin(x*0.02)*40;
        tCtx.lineTo(x, y);
    }
    tCtx.lineTo(tCanvas.width, tCanvas.height);
    tCtx.fill();
}

function checkTerrain(x, y) {
    if(x < 0 || x >= tCanvas.width || y < 0 || y >= tCanvas.height) return false;
    return tCtx.getImageData(x, y, 1, 1).data[3] > 200;
}

// Funkcja szukająca bezpiecznego Y na ziemi dla danego X
function findGroundY(x) {
    for(let y = 0; y < tCanvas.height; y += 5) {
        if(checkTerrain(x, y)) return y - 16;
    }
    return tCanvas.height * 0.5;
}

function spawnMixedPlayers() {
    const worldW = tCanvas.width;
    const padding = 200;
    
    // Tworzymy listę pozycji
    let playersData = [
        { team: 1, color: '#00d4ff', name: 'BLUE 1' },
        { team: 1, color: '#00d4ff', name: 'BLUE 2' },
        { team: 2, color: '#ff2e63', name: 'RED 1' },
        { team: 2, color: '#ff2e63', name: 'RED 2' },
        { team: 1, color: '#00d4ff', name: 'BLUE 3' },
        { team: 2, color: '#ff2e63', name: 'RED 3' }
    ];

    // Mieszamy kolejność spawnu
    playersData.sort(() => Math.random() - 0.5);

    playersData.forEach((p, index) => {
        // Rozmieszczamy postacie w różnych sekcjach planszy
        let x = padding + (index * ((worldW - padding*2) / 5));
        x += (Math.random() - 0.5) * 100; // Lekka losowość pozycji X
        
        let newPlayer = new Player(x, p.team, p.color, p.name);
        newPlayer.y = findGroundY(x); // Ustawienie od razu na planszy
        game.players.push(newPlayer);
    });
}

/**
 * POCISK I WYBUCH
 */
class Projectile {
    constructor(x, y, vx, vy) { this.x = x; this.y = y; this.vx = vx; this.vy = vy; this.active = true; }
    update() {
        this.vx += game.wind; this.vy += CONFIG.gravity;
        this.x += this.vx; this.y += this.vy;
        if(checkTerrain(this.x, this.y) || this.y > tCanvas.height) this.explode();
    }
    explode() {
        if(!this.active) return; this.active = false;
        tCtx.globalCompositeOperation = 'destination-out';
        tCtx.beginPath(); tCtx.arc(this.x, this.y, 60, 0, Math.PI*2); tCtx.fill();
        tCtx.globalCompositeOperation = 'source-over';

        game.players.forEach(p => {
            let d = Math.hypot(p.x - this.x, p.y - this.y);
            if(d < 80) {
                let force = (80-d)/80;
                p.hp -= Math.floor(force * CONFIG.explosionPower);
                let ang = Math.atan2(p.y - this.y, p.x - this.x);
                p.vx += Math.cos(ang) * force * 20; p.vy += Math.sin(ang) * force * 20 - 5;
            }
        });
        setTimeout(nextTurn, 1000);
    }
    draw() { ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(this.x, this.y, 5, 0, Math.PI*2); ctx.fill(); }
}

/**
 * GŁÓWNA PĘTLA I TURY
 */
function init() {
    document.getElementById('start-screen').style.display = 'none';
    canvas.width = window.innerWidth * CONFIG.pixelRatio;
    canvas.height = window.innerHeight * CONFIG.pixelRatio;
    ctx.scale(CONFIG.pixelRatio, CONFIG.pixelRatio);

    generateTerrain();
    spawnMixedPlayers();
    
    game.running = true;
    game.activePlayer = game.players[0];
    requestAnimationFrame(loop);
}

function nextTurn() {
    if(game.turnState === 'RESOLVING') return;
    game.turnState = 'RESOLVING';
    setTimeout(() => {
        let alive = game.players.filter(p => !p.dead);
        let nextIndex = (game.players.indexOf(game.activePlayer) + 1) % game.players.length;
        game.activePlayer = game.players[nextIndex];
        if(game.activePlayer.dead) return nextTurn();

        game.timeLeft = CONFIG.turnTime;
        game.wind = (Math.random() - 0.5) * CONFIG.windMax;
        game.turnState = 'PLAYING';
        
        document.getElementById('active-player-name').innerText = `TURA: ${game.activePlayer.name}`;
        document.getElementById('active-player-name').style.color = game.activePlayer.color;
        document.getElementById('wind-meter').innerText = `WIATR: ${(game.wind * 100).toFixed(1)}`;
    }, 1000);
}

function loop(time) {
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save();
    ctx.scale(CONFIG.zoom, CONFIG.zoom); // Skalowanie całego świata

    ctx.drawImage(tCanvas, 0, 0);

    if(game.turnState === 'PLAYING') {
        if(time - game.lastTime > 1000) {
            game.timeLeft--; game.lastTime = time;
            document.getElementById('timer').innerText = game.timeLeft;
            if(game.timeLeft <= 0) nextTurn();
        }
        game.activePlayer.vx = game.inputX * 4;
    }

    game.players.forEach(p => { p.update(); p.draw(); });
    game.projectiles.forEach((p, i) => { p.update(); p.draw(); if(!p.active) game.projectiles.splice(i,1); });

    // Celownik
    if(game.isAiming) {
        ctx.beginPath(); ctx.setLineDash([5, 5]); ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.moveTo(game.activePlayer.x, game.activePlayer.y);
        ctx.lineTo(game.activePlayer.x + (game.aimStart.x - game.aimEnd.x)/CONFIG.zoom, game.activePlayer.y + (game.aimStart.y - game.aimEnd.y)/CONFIG.zoom);
        ctx.stroke(); ctx.setLineDash([]);
    }

    ctx.restore();
    requestAnimationFrame(loop);
}

/**
 * STEROWANIE
 */
const knob = document.getElementById('joystick-knob');
const joyBase = document.getElementById('joy-base');

joyBase.addEventListener('touchstart', (e) => handleJoy(e));
joyBase.addEventListener('touchmove', (e) => handleJoy(e));
joyBase.addEventListener('touchend', () => { game.inputX = 0; knob.style.transform = `translate(0px, 0px)`; });

function handleJoy(e) {
    e.preventDefault();
    let r = joyBase.getBoundingClientRect();
    let dx = e.touches[0].clientX - (r.left + r.width/2);
    let dist = Math.max(-40, Math.min(40, dx));
    knob.style.transform = `translate(${dist}px, 0px)`;
    game.inputX = dist / 40;
}

document.getElementById('jump-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    if(game.activePlayer && game.activePlayer.grounded) game.activePlayer.vy = -8.5;
});

canvas.addEventListener('touchstart', (e) => {
    if(game.turnState !== 'PLAYING' || e.touches[0].clientX < 200) return;
    game.isAiming = true;
    game.aimStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    game.aimEnd = game.aimStart;
});

canvas.addEventListener('touchmove', (e) => {
    if(game.isAiming) game.aimEnd = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});

canvas.addEventListener('touchend', () => {
    if(!game.isAiming) return;
    game.isAiming = false;
    let power = 0.18;
    let vx = (game.aimStart.x - game.aimEnd.x) * power / CONFIG.zoom;
    let vy = (game.aimStart.y - game.aimEnd.y) * power / CONFIG.zoom;
    game.projectiles.push(new Projectile(game.activePlayer.x, game.activePlayer.y - 10, vx, vy));
    game.turnState = 'SHOOTING';
});

window.onresize = () => { location.reload(); };
</script>
</body>
</html>
